<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=500">
<title>font inflation</title>
<style>
body {background-color: white; color: black;}
.mono {font-family: monospace, "Courier New";}
.spaces {white-space: pre-wrap;}
.offscreen {
	position: absolute !important;
	top: 3000px !important;
	left: 0px !important;
}
.noadjust {
	-moz-text-size-adjust: none;
	-webkit-text-size-adjust: none;
	text-size-adjust: none;
}
.adjust {
	-moz-text-size-adjust: auto;
	-webkit-text-size-adjust: auto;
	text-size-adjust: auto;
}
.button0 {
	width: 70px;
	height: 50px;
}
.button1 {
	width: 130px;
	height: 50px;
}
.button2 {
	width: 110px;
	height: 50px;
}


</style>
</head>
<br>
<button type="button" class="button0" onclick="run()">run</button>
<button type="button" class="button1" onclick="toggle('offscreen')">toggle offscreen</button>
<button type="button" class="button2" onclick="toggle_text()">toggle text</button>
<button type="button" class="button2" onclick="toggle_lines()">toggle lines</button>
<br><br>

<div class="mono">results: <br><span id="output" class="spaces"></span></div>
<br>
<div id="offscreen">
	<u>text-size-adjust: none;</u><br><br>
	<div id="control" class="noadjust"></div>
	<br>
	<u>text-size-adjust: auto;</u><br><br>
	<div id="test" class="adjust"></div>
</div>


<body>

<script>
'use strict';
/*
	chrome://flags > #force-off-text-autosizing
notes:
- text must be visible on screen: when offscreen any text adjust reverts
- 
*/

let oText = {
	0: 'abc',
	1: 'abc def',
	2: 'abc def ghi',
	3: 'abc def ghi jkl',
	4: 'abc def ghi jkl mno',
	5: 'abc def ghi jkl mno pqr',
}
let intText = 5
let intLines = 4

function toggle(id) {
	let target = document.getElementById(id)
	if (target.classList.contains(id)) {target.classList.remove(id)} else {target.classList.add(id)}
}

function toggle_text(isToggle = true) {
	if (isToggle) {intText = (intText + 1) % 6}
	let str = oText[intText], aDisplay = []
	for (let i = 0; i < intLines; i++) {aDisplay.push(str)}
	str = '<span>'+ aDisplay.join('<br>') + '</span>'
	document.getElementById('control').innerHTML = str
	document.getElementById('test').innerHTML = str
}
toggle_text(false)

function toggle_lines() {
	intLines = (intLines + 1) % 5
	if (0 == intLines) {intLines = 1}
	toggle_text(false)
}

function run(source = 'offscreen') {
	let oData = {}, aDisplay = []
	let aTests = ['control','test']
	aTests.forEach(function(item){
		oData[item] = {}
		let target = document.getElementById(item)
		oData[item]['height'] = target.getBoundingClientRect().height // div height
		target = target.children[0]
		oData[item]['width'] = target.getBoundingClientRect().width // span width
		aDisplay.push(item.padStart(10,' ') +': ' + oData[item].width +' x '+ oData[item].height)
	})
	let wDiff = oData.test.width - oData.control.width
	let wPercentage = (wDiff/oData.control.width) * 100
	let hDiff = oData.test.height - oData.control.height
	let hPercentage = (hDiff/oData.control.height) * 100
	aDisplay.push('change'.padStart(10,' ') +': '+ wDiff +' ('+ wPercentage +'%) x '+ hDiff +' ('+ hPercentage +'%)')
	document.getElementById('output').innerHTML = aDisplay.join('<br>')
}

</script>
</body>
</html>
